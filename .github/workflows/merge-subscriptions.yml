name: Merge V2Ray Subscriptions

on:
  schedule:
    - cron: '*/59 * * * *'
  workflow_dispatch: {}

jobs:
  merge-subscriptions:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run merge script
        run: npm run merge

      - name: Show repository status after merge
        run: |
          echo "--- git status ---"
          git status --short
          echo "--- git diff stat ---"
          git diff --stat

      - name: Commit and push updates
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add merged.txt output/merged.txt output/report.json
          echo "--- git status after add ---"
          git status --short
          if git diff --cached --quiet; then
            echo "No merged changes detected; nothing to commit."
            exit 0
          fi
          git commit -m "Update merged V2Ray subscriptions [ci skip]"
          git push origin HEAD
