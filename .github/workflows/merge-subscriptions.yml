name: Merge and Validate V2Ray Subscriptions

on:
  schedule:
    - cron: '0 0,8,16 * * *'
  workflow_dispatch: {}

jobs:
  merge-and-validate:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      TCP_TIMEOUT_MS: 2000
      DNS_RETRIES: 1
      TCP_RETRIES: 1
      VALIDATION_CONCURRENCY: 50

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run merge and validation script
        run: npm run merge

      - name: Show repository status after validation
        run: |
          echo "--- git status ---"
          git status --short
          echo "--- git diff stat ---"
          git diff --stat

      - name: Commit and push updates
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add merged.txt output/merged.txt merged_checked.txt output/merged_checked.txt merged2.txt output/merged2.txt merged_checked2.txt output/merged_checked2.txt output/report.json output/health-report.json output/bad_configs.txt output/bad_configs_2.txt
          echo "--- git status after add ---"
          git status --short
          if git diff --cached --quiet; then
            echo "No changes detected; nothing to commit."
            exit 0
          fi
          git commit -m "Update V2Ray subscriptions and validation reports [ci skip]"
          git push origin HEAD
